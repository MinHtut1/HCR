<!DOCTYPE html>
<html lang="en">
<html>

<head>

    <title>FlexBox</title>


    <style>
        .container {
            background-color: lightgrey;
            width: 100%;
            height: 800px;
            display: flex;
            flex-direction: row;
            justify-content: ;
            flex-wrap: wrap;
            flex-direction: column;
            align-items: flex-end;
        }

        .flexItem1 {
            width: 200px;
            height: 100px;
            background-color: red;
        }

        .flexItem2 {
            width: 100px;
            height: 60px;
            background-color: rgb(183, 0, 255);
        }

        .flexItem3 {
            width: 400px;
            height: 200px;
            background-color: blue;
        }

        .flexItem4 {
            width: 280px;
            height: 80px;
            background-color: lightgreen;
        }

        .flexItem5 {
            width: 80px;
            height: 50px;
            background-color: burlywood;
        }
    </style>
</head>


<body>
    <div class="container">
        <div class="flexItem1">One</div>
        <div class="flexItem2">Second</div>
        <div class="flexItem3">Three</div>
        <div class="flexItem4">Four</div>
        <div class="flexItem5">Five</div>
</body>

</html>
